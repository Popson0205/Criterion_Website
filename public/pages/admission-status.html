<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Admission Status — Criterion College</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="cc-nav"></div>
<div class="page-banner">
  <div class="container">
    <div class="breadcrumb"><a href="/">Home</a><span>›</span><a href="/pages/admissions.html">Admissions</a><span>›</span>Status Check</div>
    <h1>Check Application Status</h1>
    <p>Enter your reference number to see the current status of your application.</p>
  </div>
</div>

<section class="section">
  <div class="container" style="max-width:560px">
    <div class="card">
      <h3 style="margin-bottom:20px">Application Status Lookup</h3>
      <div id="alertBox" class="alert"></div>
      <form id="statusForm">
        <div class="form-group">
          <label class="form-label">Reference Number <span class="req">*</span></label>
          <input type="text" id="refInput" class="form-control" placeholder="e.g. CC-2026-0001" required style="text-transform:uppercase;font-size:1.1rem;letter-spacing:.05em">
        </div>
        <button type="submit" class="btn btn-green btn-block" id="checkBtn">Check Status</button>
      </form>
    </div>

    <div id="resultCard" style="display:none;margin-top:24px">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
          <h3>Application Result</h3>
          <span id="statusBadge" class="badge"></span>
        </div>
        <div id="resultBody"></div>
      </div>
    </div>
  </div>
</section>

<div id="cc-footer"></div>
<script src="/js/layout.js"></script>
<script src="/js/main.js"></script>
<script>
document.getElementById('statusForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const ref = document.getElementById('refInput').value.trim().toUpperCase();
  const btn = document.getElementById('checkBtn');
  const alert = document.getElementById('alertBox');
  const resultCard = document.getElementById('resultCard');
  resultCard.style.display = 'none';
  alert.classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span> Checking...';

  try {
    const data = await apiFetch(`/api/admission/status/${ref}`);
    const badge = document.getElementById('statusBadge');
    const statusMap = { pending: ['badge-pending','⏳ Pending'], admitted: ['badge-admitted','✅ Admitted'], rejected: ['badge-rejected','❌ Not Admitted'] };
    const [cls, label] = statusMap[data.status] || ['badge-normal', data.status];
    badge.className = `badge ${cls}`;
    badge.textContent = label;

    let html = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:0.9rem">
        <div><div style="color:var(--gray-500);font-size:0.78rem;font-weight:600;margin-bottom:2px">REFERENCE</div><strong>${esc(data.refNumber)}</strong></div>
        <div><div style="color:var(--gray-500);font-size:0.78rem;font-weight:600;margin-bottom:2px">NAME</div><strong>${esc(data.surname)} ${esc(data.firstName)}</strong></div>
        <div><div style="color:var(--gray-500);font-size:0.78rem;font-weight:600;margin-bottom:2px">APPLIED</div>${fmtDate(data.appliedAt)}</div>
        <div><div style="color:var(--gray-500);font-size:0.78rem;font-weight:600;margin-bottom:2px">STATUS</div>${label}</div>
      </div>`;

    if (data.status === 'admitted') {
      html += `<div style="background:var(--green-50);border:1px solid var(--green-300);border-radius:var(--radius);padding:16px;margin-top:16px">
        <div style="font-weight:700;color:var(--green-800);margin-bottom:8px">🎉 Congratulations — You have been admitted!</div>
        <div style="font-size:0.875rem;color:var(--gray-700)"><strong>Class:</strong> ${esc(data.classAdmitted || '—')}</div>
        ${data.remark ? `<div style="font-size:0.875rem;color:var(--gray-600);margin-top:6px">${esc(data.remark)}</div>` : ''}
        <div style="font-size:0.875rem;margin-top:10px">Please visit the school with your documents to complete enrolment.</div>
      </div>`;
    } else if (data.status === 'rejected') {
      html += `<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:var(--radius);padding:16px;margin-top:16px">
        <div style="font-weight:700;color:#991b1b;margin-bottom:6px">Application Unsuccessful</div>
        ${data.remark ? `<div style="font-size:0.875rem;color:var(--gray-600)">${esc(data.remark)}</div>` : ''}
        <div style="font-size:0.875rem;margin-top:8px">Contact the admissions office for further guidance.</div>
      </div>`;
    } else {
      html += `<div style="background:var(--gold-50);border:1px solid var(--gold-300);border-radius:var(--radius);padding:14px;margin-top:16px;font-size:0.875rem;color:var(--gold-600)">Your application is under review. Check back in a few days.</div>`;
    }

    document.getElementById('resultBody').innerHTML = html;
    resultCard.style.display = 'block';
  } catch(err) {
    showAlert(alert, err.message === 'Application not found' ? 'No application found with that reference number.' : err.message);
  }
  btn.disabled = false;
  btn.innerHTML = 'Check Status';
});
</script>
</body></html>
