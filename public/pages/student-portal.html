<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal — Criterion College</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="dash-wrap">
  <nav class="dash-nav">
    <div class="dash-nav-brand">
      Criterion College <span>Student Portal</span>
    </div>
    <div class="dash-nav-user">
      <span id="navName" style="color:var(--green-100)"></span>
      <a href="/pages/login.html" onclick="logout();return false;" style="color:var(--gold-400);font-weight:600;font-size:0.82rem">Logout</a>
    </div>
  </nav>

  <div class="dash-body">
    <div class="dash-greeting">
      <h2>Welcome back, <span id="greetName"></span> 👋</h2>
      <p id="greetClass"></p>
    </div>

    <!-- Stats -->
    <div class="dash-stats" id="statsRow">
      <div class="dash-stat">
        <div class="dash-stat-label">Student ID</div>
        <div class="dash-stat-val" id="statId" style="font-size:1.1rem">—</div>
      </div>
      <div class="dash-stat">
        <div class="dash-stat-label">Class</div>
        <div class="dash-stat-val" id="statClass" style="font-size:1.1rem">—</div>
      </div>
      <div class="dash-stat">
        <div class="dash-stat-label">Current Session</div>
        <div class="dash-stat-val" id="statSession" style="font-size:1.1rem">—</div>
      </div>
      <div class="dash-stat">
        <div class="dash-stat-label">Current Term</div>
        <div class="dash-stat-val" id="statTerm" style="font-size:1.1rem">—</div>
      </div>
    </div>

    <!-- Results Panel -->
    <div class="dash-panel">
      <div class="dash-panel-header">
        <h3>My Results</h3>
        <div style="display:flex;gap:8px">
          <select id="sessionFilter" class="form-control" style="width:auto;font-size:0.82rem;padding:6px 10px"></select>
          <select id="termFilter" class="form-control" style="width:auto;font-size:0.82rem;padding:6px 10px">
            <option value="1ST TERM">1st Term</option>
            <option value="2ND TERM">2nd Term</option>
            <option value="3RD TERM">3rd Term</option>
          </select>
          <button class="btn btn-green btn-sm" id="loadResultBtn">Load Result</button>
        </div>
      </div>
      <div id="resultArea">
        <p style="color:var(--gray-500);font-size:0.9rem">Select a session and term, then click Load Result.</p>
      </div>
    </div>

    <!-- All Results Summary -->
    <div class="dash-panel">
      <div class="dash-panel-header"><h3>Result History</h3></div>
      <div id="historyArea"><p style="color:var(--gray-500);font-size:0.9rem">Loading...</p></div>
    </div>
  </div>
</div>

<script src="/js/main.js"></script>
<script>
requireStudentAuth();

const name      = getName();
const studentId = localStorage.getItem('cc_student_id');
const classId   = localStorage.getItem('cc_class_id');

document.getElementById('navName').textContent   = name;
document.getElementById('greetName').textContent = name ? name.split(' ')[0] : 'Student';
document.getElementById('greetClass').textContent = classId ? `Class: ${classId}` : '';
document.getElementById('statId').textContent    = studentId || '—';
document.getElementById('statClass').textContent  = classId  || '—';

async function loadData() {
  try {
    const data = await apiFetch('/api/student/results');
    document.getElementById('statSession').textContent = data.currentSession || '—';
    document.getElementById('statTerm').textContent    = data.currentTerm    || '—';

    // Populate session filter from results
    const sessions = [...new Set(data.results.map(r => r.session))].sort().reverse();
    const sf = document.getElementById('sessionFilter');
    sf.innerHTML = sessions.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('') || '<option value="">No results</option>';
    if (data.currentSession) {
      sf.value = data.currentSession;
      document.getElementById('termFilter').value = data.currentTerm || '1ST TERM';
    }

    // History table
    if (data.results.length === 0) {
      document.getElementById('historyArea').innerHTML = '<p style="color:var(--gray-500);font-size:0.9rem">No results available yet.</p>';
      return;
    }
    let html = '<div class="table-wrap"><table><thead><tr><th>Session</th><th>Term</th><th>Subjects</th><th>Action</th></tr></thead><tbody>';
    data.results.forEach(r => {
      const subjectCount = Object.keys(r.scores || {}).length;
      html += `<tr>
        <td>${esc(r.session)}</td>
        <td>${esc(r.term)}</td>
        <td>${subjectCount} subject${subjectCount !== 1 ? 's' : ''}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="viewResult('${esc(r.session)}','${esc(r.term)}')">View</button></td>
      </tr>`;
    });
    html += '</tbody></table></div>';
    document.getElementById('historyArea').innerHTML = html;
  } catch(err) {
    document.getElementById('historyArea').innerHTML = `<p style="color:#ef4444;font-size:0.9rem">Error loading results: ${esc(err.message)}</p>`;
  }
}

async function viewResult(session, term) {
  const area = document.getElementById('resultArea');
  area.innerHTML = '<div style="text-align:center;padding:24px"><span class="loader loader-green"></span></div>';
  try {
    const data = await apiFetch(`/api/student/results/${encodeURIComponent(session)}/${encodeURIComponent(term)}`);
    const scores = data.result.scores || {};
    const subjects = Object.keys(scores);
    if (subjects.length === 0) {
      area.innerHTML = '<p style="color:var(--gray-500)">No scores recorded for this term yet.</p>';
      return;
    }
    let total = 0, count = 0;
    let rows = subjects.map(sub => {
      const s = scores[sub];
      const score = typeof s === 'object' ? (s.total || 0) : Number(s);
      total += score; count++;
      const grade = score >= 70 ? 'A' : score >= 60 ? 'B' : score >= 50 ? 'C' : score >= 45 ? 'D' : score >= 40 ? 'E' : 'F';
      const color = score >= 70 ? 'var(--green-700)' : score >= 50 ? 'var(--gold-600)' : '#dc2626';
      return `<tr><td>${esc(sub)}</td><td style="font-weight:700;color:${color}">${score}</td><td>${grade}</td></tr>`;
    }).join('');
    const avg = count ? (total / count).toFixed(1) : 0;
    area.innerHTML = `
      <div style="margin-bottom:16px;display:flex;gap:16px;flex-wrap:wrap">
        <div style="background:var(--green-50);border:1px solid var(--green-200);border-radius:var(--radius);padding:12px 20px;text-align:center">
          <div style="font-size:0.75rem;color:var(--gray-500);font-weight:600">AVERAGE</div>
          <div style="font-size:1.4rem;font-weight:800;color:var(--green-700)">${avg}%</div>
        </div>
        <div style="background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius);padding:12px 20px">
          <div style="font-size:0.75rem;color:var(--gray-500);font-weight:600">TERM</div>
          <div style="font-size:0.95rem;font-weight:700;color:var(--gray-900)">${esc(data.result.term)}</div>
          <div style="font-size:0.8rem;color:var(--gray-500)">${esc(data.result.session)}</div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Subject</th><th>Score</th><th>Grade</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      ${data.result.teacherComment ? `<div style="margin-top:16px;padding:14px;background:var(--green-50);border-radius:var(--radius);font-size:0.875rem"><strong>Teacher's Comment:</strong> ${esc(data.result.teacherComment)}</div>` : ''}
      ${data.result.principalComment ? `<div style="margin-top:8px;padding:14px;background:var(--gold-50);border-radius:var(--radius);font-size:0.875rem"><strong>Principal's Comment:</strong> ${esc(data.result.principalComment)}</div>` : ''}`;
  } catch(err) {
    area.innerHTML = `<p style="color:#ef4444;font-size:0.9rem">${esc(err.message)}</p>`;
  }
}

document.getElementById('loadResultBtn').addEventListener('click', () => {
  const session = document.getElementById('sessionFilter').value;
  const term    = document.getElementById('termFilter').value;
  if (session) viewResult(session, term);
});

loadData();
</script>
</body></html>
